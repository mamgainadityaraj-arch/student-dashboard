<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta name="theme-color" content="#4f46e5">
</head>

<body>

<header class="topbar">
    <h1><i class="fa-solid fa-graduation-cap"></i> Student Dashboard</h1>

    <button id="darkModeBtn">
        <i class="fa-solid fa-moon"></i>
    </button>
</header>

<!-- STATS -->
<section class="stats">

    <div class="card">
        <h3><i class="fa-solid fa-book"></i> Homework Pending</h3>
        <p id="pendingCount">0</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-check"></i> Homework Done</h3>
        <p id="completedCount">0</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-clock"></i> Exams</h3>
        <p id="examCount">0</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-fire"></i> Streak</h3>
        <p id="streakDisplay">0 Days</p>
    </div>

</section>

<!-- HOMEWORK -->
<section class="section">
    <h2><i class="fa-solid fa-book"></i> Homework Tracker</h2>

    <div class="input-grid">
        <input type="text" id="homeworkTitle" placeholder="Title">
        <input type="text" id="homeworkSubject" placeholder="Subject">
        <input type="date" id="homeworkDate">

        <select id="homeworkStatus">
            <option>To Do</option>
            <option>In Progress</option>
            <option>Done</option>
        </select>
    </div>

    <button onclick="addHomework()">Add Homework</button>

    <div id="homeworkList"></div>
</section>

<!-- EXAMS -->
<section class="section">
    <h2><i class="fa-solid fa-clock"></i> Exam Countdown</h2>

    <div class="input-grid">
        <input type="text" id="examName" placeholder="Exam Name">
        <input type="date" id="examDate">
    </div>

    <button onclick="addExam()">Add Exam</button>

    <div id="examList"></div>
</section>

<!-- MARKS -->
<section class="section">
    <h2><i class="fa-solid fa-chart-line"></i> Marks Tracker</h2>

    <div class="input-grid">
        <input type="text" id="subjectName" placeholder="Subject">
        <input type="number" id="marksObtained" placeholder="Obtained">
        <input type="number" id="totalMarks" placeholder="Total">
    </div>

    <button onclick="addMarks()">Add Marks</button>

    <div id="marksList"></div>

    <p class="summary">
        Average: <span id="averagePercentage">0%</span>
    </p>
</section>

<!-- GRAPH -->
<section class="section">
    <h2><i class="fa-solid fa-chart-simple"></i> Progress Graph</h2>
    <canvas id="marksChart"></canvas>
</section>

<!-- REMINDERS -->
<section class="section">
    <h2><i class="fa-solid fa-bell"></i> Study Reminders</h2>

    <div class="input-grid">
        <input type="text" id="reminderText" placeholder="Task">
        <input type="datetime-local" id="reminderTime">
    </div>

    <button onclick="addReminder()">Add Reminder</button>

    <div id="reminderList"></div>
</section>

<!-- GOALS -->
<section class="section">
    <h2><i class="fa-solid fa-bullseye"></i> Study Goals</h2>

    <input type="text" id="goalInput" placeholder="Enter goal">
    <button onclick="addGoal()">Add Goal</button>

    <div id="goalList"></div>
</section>

<!-- STREAK -->
<section class="section">
    <h2><i class="fa-solid fa-fire"></i> Study Streak</h2>

    <button id="studyBtn">Mark Today as Done</button>

    <div class="streak-box">
        <p>Current: <span id="currentStreak">0</span> days</p>
        <p>Best: <span id="bestStreak">0</span> days</p>
    </div>
</section>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
