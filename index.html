<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>📚 Student Dashboard</h1>

        <button id="darkModeBtn">
            🌙 Dark Mode
        </button>
    </header>

    <!-- Stats Section -->
    <section class="stats">

        <div class="card">
            <h3>Homework Pending</h3>
            <p id="pendingCount">0</p>
        </div>

        <div class="card">
            <h3>Homework Completed</h3>
            <p id="completedCount">0</p>
        </div>

        <div class="card">
            <h3>Upcoming Exams</h3>
            <p id="examCount">0</p>
        </div>

        <div class="card">
            <h3>Study Streak</h3>
            <p id="streakDisplay">0 Days</p>
        </div>

    </section>

    <!-- Homework Tracker -->
    <section class="dashboard-section">

        <h2>📝 Homework Tracker</h2>

        <div class="form-group">
            <input
                type="text"
                id="homeworkTitle"
                placeholder="Homework Title">

            <input
                type="text"
                id="homeworkSubject"
                placeholder="Subject">

            <input
                type="date"
                id="homeworkDate">

            <select id="homeworkStatus">
                <option value="To Do">To Do</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>

            <button onclick="addHomework()">
                Add Homework
            </button>
        </div>

        <div id="homeworkList"></div>

    </section>

    <!-- Exam Countdown -->
    <section class="dashboard-section">

        <h2>⏳ Exam Countdown</h2>

        <div class="form-group">
            <input
                type="text"
                id="examName"
                placeholder="Exam Name">

            <input
                type="date"
                id="examDate">

            <button onclick="addExam()">
                Add Exam
            </button>
        </div>

        <div id="examList"></div>

    </section>

    <!-- Marks Tracker -->
    <section class="dashboard-section">

        <h2>📊 Marks Tracker</h2>

        <div class="form-group">

            <input
                type="text"
                id="subjectName"
                placeholder="Subject">

            <input
                type="number"
                id="marksObtained"
                placeholder="Marks Obtained">

            <input
                type="number"
                id="totalMarks"
                placeholder="Total Marks">

            <button onclick="addMarks()">
                Add Marks
            </button>

        </div>

        <div id="marksList"></div>

        <h3>
            Average Percentage:
            <span id="averagePercentage">0%</span>
        </h3>

    </section>

    <!-- Study Streak -->
    <section class="dashboard-section">

        <h2>🔥 Study Streak</h2>

        <button id="studyBtn">
            Studied Today
        </button>

        <h3>
            Current Streak:
            <span id="currentStreak">0</span>
        </h3>

        <h3>
            Best Streak:
            <span id="bestStreak">0</span>
        </h3>

    </section>

    <!-- Goals -->
    <section class="dashboard-section">

        <h2>🎯 Study Goals</h2>

        <div class="form-group">

            <input
                type="text"
                id="goalInput"
                placeholder="Enter Goal">

            <button onclick="addGoal()">
                Add Goal
            </button>

        </div>

        <div id="goalList"></div>

    </section>

    <!-- Notification Box -->
    <div id="notification"></div>

    <script src="script.js"></script>

</body>
</html>
